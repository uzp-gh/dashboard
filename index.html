<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>
<link rel="icon" type="image/x-icon" href="favicon.png">
<style>
  :root{
    --bg:#0a0a0a;
    --panel-bg:#121212;
    --card-bg:#141414;
    --chart-bg:#0e0e0e;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.16);
    --text:#f4f4f4;
    --text-muted:#9a9a9a;
    --text-faint:#63636b;
    --accent:#00e38c;
    --accent-soft:rgba(0,227,140,0.14);
    --accent-strong:#00c97a;
    --danger:#ff5c5c;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    top:-200px; left:-200px;
    width:600px; height:600px;
    background:radial-gradient(circle, rgba(0,227,140,0.16), transparent 65%);
    pointer-events:none;
    z-index:0;
  }
  button{font-family:var(--font);}
  .page{
    position:relative;
    z-index:1;
    max-width:1400px;
    margin:0 auto;
    padding:28px 32px 60px;
  }

  /* ---------- Header ---------- */
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:24px;
    flex-wrap:wrap;
  }
  .header-left{display:flex; align-items:center; gap:14px;}
  .logo-mark{
    width:42px; height:42px;
    border-radius:12px;
    background:var(--panel-bg);
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    color:var(--accent);
    flex-shrink:0;
  }
  .header-title{display:flex; flex-direction:column; gap:2px;}
  .header-title h1{
    margin:0; font-size:1.15rem; font-weight:600; letter-spacing:-0.01em;
    display:flex; align-items:center; gap:8px;
  }
  .live-dot{
    width:7px; height:7px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
    display:inline-block;
  }
  .header-title p{margin:0; font-size:0.82rem; color:var(--text-muted);}
  .header-right{display:flex; align-items:center; gap:8px; flex-wrap:wrap; position:relative;}
  .last-updated{font-size:0.76rem; color:var(--text-faint); white-space:nowrap; margin-right:2px;}
  @media (max-width:600px){
    /* Ikony i tekst "Zaktualizowano..." wyrównane do prawej krawędzi */
    .header-right{
      width:100%;
      justify-content:flex-end;
    }
    .last-updated{
      order:99;
      width:100%;
      margin:6px 0 0;
      text-align:right;
    }
  }
  .icon-btn{
    position:relative;
    width:36px; height:36px;
    border-radius:10px;
    background:var(--panel-bg);
    border:1px solid var(--border);
    color:var(--text-muted);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
    flex-shrink:0;
  }
  .icon-btn:hover{border-color:var(--border-strong); color:var(--text);}
  .icon-btn.active{border-color:var(--accent); color:var(--accent);}
  .icon-btn.spinning svg{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .icon-badge{
    position:absolute; top:-5px; right:-5px;
    min-width:15px; height:15px;
    padding:0 3px;
    border-radius:999px;
    background:#3a3a3a;
    color:#fff;
    font-size:0.6rem;
    font-weight:700;
    line-height:15px;
    text-align:center;
    box-shadow:0 0 0 2px var(--bg);
  }
  .icon-badge.count-danger{background:var(--danger);}
  .icon-badge.count-accent{background:var(--accent); color:#052015;}

  /* ---------- Search ---------- */
  .search-wrap{display:flex; align-items:center; gap:6px; position:relative;}
  .search-input{
    position:absolute;
    top:50%;
    right:0;
    transform:translateY(-50%);
    width:0; opacity:0; padding:0; border:none;
    background:var(--panel-bg);
    color:var(--text);
    border-radius:10px;
    font-size:0.85rem;
    transition:width .18s ease, opacity .18s ease, padding .18s ease;
    height:36px;
    z-index:40;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
  }
  .search-input.open{
    width:220px; opacity:1; padding:0 12px;
    border:1px solid var(--border);
  }
  .search-input:focus{outline:none; border-color:var(--border-strong);}

  /* ---------- Bell popup ---------- */
  .bell-wrap, .settings-wrap{position:relative;}
  .bell-count{
    position:absolute; top:-4px; right:-4px;
    min-width:16px; height:16px;
    padding:0 4px;
    border-radius:999px;
    background:var(--danger);
    color:#fff;
    font-size:0.65rem;
    font-weight:700;
    line-height:16px;
    text-align:center;
    box-shadow:0 0 0 2px var(--bg);
  }
  .bell-popup, .settings-popup{
    position:absolute;
    top:calc(100% + 10px);
    right:0;
    width:360px;
    max-width:min(92vw, 400px);
    max-height:460px;
    display:none;
    flex-direction:column;
    background:var(--panel-bg);
    border:1px solid var(--border-strong);
    border-radius:var(--radius-md);
    box-shadow:0 12px 32px rgba(0,0,0,0.5);
    z-index:30;
    overflow:hidden;
  }
  /* Widoczny jest TYLKO popup z klasą .open — sterujemy stanem przez klasę,
     a nie przez atrybut [hidden], bo reguła display:flex powyżej i tak
     przesłaniałaby domyślne ukrycie z [hidden]. */
  .bell-popup.open, .settings-popup.open{
    display:flex;
  }
  @media (max-width:600px){
    /* Na smartfonie popup wyświetla się zawsze na środku ekranu, a nie
       przypięty do przycisku, który go otworzył (inaczej wychodził poza ekran) */
    .bell-popup, .settings-popup{
      position:fixed;
      top:50%;
      left:50%;
      right:auto;
      transform:translate(-50%, -50%);
      width:92vw;
      max-width:400px;
      max-height:80vh;
    }
  }

  /* Ciemna warstwa pod popupem (tylko mobile) - klik w nią zamyka popup
     (obsłużone przez istniejący globalny listener zamykający po kliknięciu poza popupem) */
  .popup-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:29;
  }
  @media (max-width:600px){
    .popup-overlay.active{ display:block; }
  }
  .bell-popup-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:12px 14px;
    font-size:0.9rem;
    font-weight:600;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .bell-popup-header-left{display:flex; align-items:baseline; gap:8px;}
  .bell-popup-sub{font-size:0.72rem; font-weight:500; color:var(--text-faint);}
  .bell-popup-actions{display:flex; gap:6px;}
  .mini-btn{
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-muted);
    border-radius:8px;
    padding:5px 9px;
    font-size:0.72rem;
    font-weight:600;
    cursor:pointer;
    display:flex; align-items:center; gap:4px;
    transition:border-color .15s ease, color .15s ease;
  }
  .mini-btn:hover{border-color:var(--border-strong); color:var(--text);}
  .bell-list{overflow-y:auto; padding:6px;}
  .bell-item{
    display:flex;
    flex-direction:column;
    gap:4px;
    padding:10px 10px;
    border-radius:var(--radius-sm);
  }
  .bell-item:hover{background:rgba(255,255,255,0.04);}
  .bell-item-top{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .bell-item-name{font-weight:600; font-size:0.86rem; color:var(--text);}
  .bell-item-type{
    display:inline-flex; margin-left:6px;
    padding:2px 8px;
    border-radius:999px;
    background:var(--accent-soft);
    color:var(--accent);
    font-weight:600;
    font-size:0.68rem;
    white-space:nowrap;
  }
  .bell-item-del{
    border:none; background:transparent; color:var(--text-faint);
    cursor:pointer; font-size:1rem; line-height:1; padding:2px 4px;
  }
  .bell-item-del:hover{color:var(--danger);}
  .bell-item-label{font-size:0.78rem; color:var(--text-muted);}
  .bell-item-meta{display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:0.72rem; color:var(--text-faint);}
  .bell-empty{padding:32px 16px; text-align:center; color:var(--text-muted); font-size:0.85rem;}

  /* ---------- Settings popup ---------- */
  .settings-tabs{display:flex; border-bottom:1px solid var(--border); flex-shrink:0;}
  .settings-tab{
    flex:1; padding:11px 8px; text-align:center;
    background:transparent; border:none; color:var(--text-muted);
    font-size:0.82rem; font-weight:600; cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .settings-tab.active{color:var(--text); border-bottom-color:var(--accent);}
  .settings-panel{padding:14px; overflow-y:auto;}
  .settings-check{
    display:flex; align-items:center; gap:9px;
    padding:8px 4px; font-size:0.83rem; color:var(--text); cursor:pointer;
  }
  .settings-check input{accent-color:var(--accent); width:15px; height:15px;}
  .settings-check.disabled{color:var(--text-faint); cursor:not-allowed;}
  .settings-check.disabled input{cursor:not-allowed;}
  .settings-note{font-size:0.74rem; color:var(--text-faint); padding:6px 4px 2px;}
  .settings-field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
  .settings-field label{font-size:0.76rem; color:var(--text-muted); font-weight:600;}
  .settings-field input{
    background:var(--card-bg); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:8px 10px; font-size:0.82rem;
  }
  .settings-field input:focus{outline:none; border-color:var(--border-strong);}
  .settings-actions{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .settings-divider{height:1px; background:var(--border); margin:16px 0; border:none;}
  .settings-group-label{font-size:0.76rem; color:var(--text-muted); font-weight:600; margin-bottom:8px;}

  /* ---------- Tab bar ---------- */
  .tabbar{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--panel-bg);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:8px;
    margin-bottom:28px;
  }
  .tab-arrow{
    flex-shrink:0;
    width:34px; height:34px;
    border-radius:var(--radius-sm);
    border:1px solid transparent;
    background:transparent;
    color:var(--text-muted);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .tab-arrow:hover{background:rgba(255,255,255,0.06); color:var(--text);}
  .tab-list{
    display:flex;
    gap:4px;
    overflow-x:auto;
    scroll-behavior:smooth;
    scrollbar-width:none;
    flex:1;
  }
  .tab-list::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex-shrink:0;
    padding:9px 18px;
    border-radius:var(--radius-sm);
    border:1px solid transparent;
    background:transparent;
    color:var(--text-muted);
    font-family:var(--font);
    font-size:0.9rem;
    font-weight:500;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{
    background:rgba(255,255,255,0.06);
    border-color:var(--border-strong);
    color:var(--text);
  }
  .tab-btn .count{
    color:var(--text-faint);
    font-size:0.78rem;
    margin-left:6px;
  }
  .tab-btn.active .count{color:var(--accent);}

  /* ---------- Status states ---------- */
  .state-box{
    border:1px solid var(--border);
    background:var(--panel-bg);
    border-radius:var(--radius-lg);
    padding:48px 24px;
    text-align:center;
    color:var(--text-muted);
    font-size:0.92rem;
  }
  .state-box.error{color:#ff8a8a;}
  .state-box button{
    margin-top:14px;
    background:var(--accent-soft);
    color:var(--accent);
    border:1px solid rgba(0,227,140,0.35);
    padding:8px 18px;
    border-radius:999px;
    font-family:var(--font);
    font-weight:600;
    font-size:0.85rem;
    cursor:pointer;
  }

  /* ---------- Grid & cards ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:22px;
  }
  .grid.cols-3{grid-template-columns:repeat(3, 1fr);}
  .grid.cols-2{grid-template-columns:repeat(2, 1fr);}
  @media (max-width:1200px){ .grid{grid-template-columns:repeat(3,1fr);} }
  @media (max-width:900px){ .grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:600px){
    .page{padding:20px 16px 40px;}
    /* Na smartfonie układ jest zawsze jednokolumnowy, niezależnie od zapisanego
       ustawienia liczby kolumn (stąd wyższa specyficzność niż .grid.cols-2/.cols-3) */
    .grid, .grid.cols-2, .grid.cols-3{grid-template-columns:1fr;}
    #gridViewBtn{display:none;}
  }

  .card{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:14px;
    transition:border-color .15s ease;
  }
  .card:hover{border-color:var(--border-strong);}

  .chart-box{
    position:relative;
    width:100%;
    aspect-ratio:1/0.92;
    background:var(--chart-bg);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    overflow:hidden;
  }
  .chart-box .tradingview-widget-container,
  .chart-box .tradingview-widget-container__widget{
    width:100% !important;
    height:100% !important;
  }
  .chart-placeholder{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:var(--text-faint);
    font-size:0.85rem;
    text-align:center;
    padding:12px;
  }
  /* Zawsze ukrywamy wiersz z copyrightem/branding dodawany przez skrypt TradingView */
  .tradingview-widget-copyright{
    display:none !important;
  }

  .card-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
  }
  .card-name{
    font-size:1.12rem;
    font-weight:600;
    letter-spacing:-0.01em;
    margin:0;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .card-change{
    flex-shrink:0;
    font-weight:600;
    font-size:0.95rem;
    text-align:right;
    white-space:nowrap;
  }
  .card-change.positive{color:var(--accent);}
  .card-change.negative{color:var(--danger);}
  .card-change.neutral{color:var(--text-muted);}

  .stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    row-gap:8px;
    column-gap:10px;
    font-size:0.86rem;
    border-top:1px solid var(--border);
    padding-top:12px;
  }
  .stat{display:flex; align-items:center; justify-content:space-between; gap:6px;}
  .stat .k{color:var(--text-muted);}
  .stat .v{font-weight:600; color:var(--text);}
  .stat .v.badge{
    background:var(--accent-soft);
    color:var(--accent);
    padding:2px 10px;
    border-radius:999px;
    font-size:0.8rem;
  }

  .card-desc-wrap{display:flex; flex-direction:column; gap:4px;}
  .card-desc{
    margin:0;
    font-size:0.82rem;
    line-height:1.5;
    color:var(--text-muted);
    display:-webkit-box;
    -webkit-line-clamp:4;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card-desc.expanded{-webkit-line-clamp:unset; display:block;}
  .desc-toggle{
    align-self:flex-start;
    border:none; background:transparent;
    color:var(--accent);
    font-size:0.76rem; font-weight:600;
    cursor:pointer; padding:0;
  }

  /* ---------- Floating Google Sheet widget ---------- */
  .sheet-float{
    position:fixed;
    left:20px; bottom:20px;
    width:400px; height:400px;
    background:var(--panel-bg);
    border:1px solid var(--border-strong);
    border-radius:var(--radius-md);
    box-shadow:0 12px 36px rgba(0,0,0,0.55);
    display:flex; flex-direction:column;
    overflow:hidden;
    z-index:50;
    transition:width .2s ease, height .2s ease;
  }
  .sheet-float.state-maximized{
    width:calc(100vw - 40px);
    max-width:1400px;
    height:70vh;
  }
  .sheet-float.state-minimized, .sheet-float.state-closed{display:none;}
  .sheet-float-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 10px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .sheet-float-title{font-size:0.78rem; font-weight:600; color:var(--text-muted);}
  .sheet-float-controls{display:flex; gap:4px;}
  .sheet-float-controls button{
    width:24px; height:24px;
    border-radius:6px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-muted);
    cursor:pointer;
    font-size:0.85rem;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .sheet-float-controls button:hover{color:var(--text); border-color:var(--border-strong);}
  .sheet-float iframe{flex:1; width:100%; border:none; background:#fff;}
  .sheet-icon{
    position:fixed; left:20px; bottom:20px;
    width:50px; height:50px;
    border-radius:50%;
    background:var(--accent);
    border:none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(0,227,140,0.35);
    z-index:50;
  }
  .sheet-icon:hover{background:var(--accent-strong);}
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8.7L13 14.4l-3-3-4.7 4.7"/></svg>
      </div>
      <div class="header-title">
        <h1>Trading Dashboard <span class="live-dot"></span></h1>
        <p>All in one: BOS / ChoCH / Entry / TP</p>
      </div>
    </div>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated">—</span>

      <button class="icon-btn" id="refreshBtn" title="Odśwież dane">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>

      <button class="icon-btn" id="sortBtn" title="Sortowanie: domyślne (kliknij, aby zmienić)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
        <span class="icon-badge" id="sortBadge" hidden></span>
      </button>

      <div class="search-wrap">
        <button class="icon-btn" id="searchBtn" title="Szukaj waloru">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <input type="text" id="searchInput" class="search-input" placeholder="Szukaj waloru…">
      </div>

      <button class="icon-btn" id="gridViewBtn" title="Liczba kolumn: 4 (kliknij, aby zmienić)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span class="icon-badge" id="gridBadge">4</span>
      </button>

      <div class="bell-wrap">
        <button class="icon-btn" id="bellBtn" title="Powiadomienia">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="bell-count" id="bellCount" hidden>0</span>
        </button>

<script>
/* =========================================================================
   KONFIGURACJA
   ID arkusza Google Sheets. W arkuszu MUSI istnieć zakładka o nazwie
   "config" — jej kolumna A (od wiersza 1) zawiera nazwy pozostałych
   zakładek, które mają zostać pokazane jako karty dashboardu.
   Arkusz musi mieć włączone udostępnianie "Każda osoba mająca link -
   może przeglądać", aby dane dało się pobrać z poziomu przeglądarki
   (bez klucza API — dane są pobierane techniką JSONP).
   ========================================================================= */
  const DEFAULT_SPREADSHEET_ID = '1lfSqWjtJbT2MtQTIsNd1hdjbdSyH9UidubgomC-My8w';
  const CONFIG_SHEET_NAME = 'config';
  const AUTO_REFRESH_MS = 7.5 * 60 * 1000; // 7,5 minuty

  let SPREADSHEET_ID = DEFAULT_SPREADSHEET_ID;

  function tvWidgetConfig(symbol, interval){
    return {
      allow_symbol_change: false,
      calendar: false,
      details: false,
      hide_side_toolbar: true,
      hide_top_toolbar: true,
      hide_legend: true,

      save_image: false,

      backgroundColor: "#0F0F0F",
      gridColor: "rgba(242, 242, 242, 0)",
      watchlist: [],
      withdateranges: false,
      compareSymbols: [],

      width: "100%",
      height: "100%"
    };
  }

/* ============================== CIASTECZKA ================================ */
  function setCookie(name, value, days){
    const maxAge = days * 24 * 60 * 60;
    document.cookie = name + '=' + encodeURIComponent(value) + ';max-age=' + maxAge + ';path=/;SameSite=Lax';
  }
  function getCookie(name){
    const escaped = name.replace(/([.$?*|{}()[\]\\/+^])/g, '\\$1');
    const match = document.cookie.match(new RegExp('(?:^|; )' + escaped + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

/* ============================== USTAWIENIA I ALERTY (STAN) ================ */
  let settings = {
    spreadsheetId: '',
    sheetUrl: '',
    email: '',
    studies: ['STD;SMA'],
  };
  let alerts = []; // {id, sheet, nazwa, ticker, key, short, label, cena, detectedAt, updatedAt}

  function loadSettingsFromCookie(){
    const raw = getCookie('dashSettings');
    if(raw){
      try{
        const parsed = JSON.parse(raw);
        settings = Object.assign(settings, parsed);
      } catch(e){ /* ignorujemy uszkodzone dane */ }
    }
  }
  function persistSettings(){
    setCookie('dashSettings', JSON.stringify(settings), 365);
  }
  function loadAlertsFromCookie(){
    const raw = getCookie('dashAlerts');
    if(raw){
      try{ alerts = JSON.parse(raw) || []; } catch(e){ alerts = []; }
    }
  }
  function persistAlerts(){
    const capped = alerts.slice(-200); // ograniczenie rozmiaru ciasteczka
    setCookie('dashAlerts', JSON.stringify(capped), 365);
  }

/* ============================== STAN OGÓLNY ================================ */
  const cache = {};              // { sheetName: [ {...rekordy...} ] }
  const chartObserver = new IntersectionObserver(onChartVisible, { rootMargin: '200px' });
  let configSheetNames = [];     // lista zakładek wczytana z arkusza "config"
  let activeSheet = null;
  let sortMode = 'default';      // 'default' | 'asc' | 'desc'
  let gridCols = 4;              // 4 | 3 | 2
  let searchTerm = '';
  let bellPopupOpen = false;
  let settingsPopupOpen = false;

/* ============================== POMOCNICZE ================================= */
  function normalizeHeader(h){
    // Usuwamy spacje, podkreślenia itp., aby "SMA50", "SMA 50" i "SMA_50"
    // były traktowane jako ta sama nazwa kolumny.
    return (h || '').toString().trim().toLowerCase().replace(/[^a-z0-9żźćńółęąś]/g, '');
  }

  function escapeHtml(s){
    return (s || '').toString()
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function parseNum(v){
    if(v === undefined || v === null || v === '') return NaN;
    const cleaned = String(v).replace(/\s/g,'').replace(',', '.');
    const n = parseFloat(cleaned);
    return isNaN(n) ? NaN : n;
  }

  function formatCena(v){
    const n = parseNum(v);
    if(isNaN(n)) return (v || '—');
    return n.toLocaleString('pl-PL', { maximumFractionDigits: 4 });
  }

  function formatDateTime(iso){
    try{
      return new Date(iso).toLocaleString('pl-PL', { dateStyle: 'short', timeStyle: 'short' });
    } catch(e){ return ''; }
  }

  // Renderuje ciąg SMA_R znak po znaku: "+" na zielono, "-" na czerwono, wszystko pogrubione.
  function renderSmaR(str){
    if(!str) return '—';
    return str.split('').map(ch => {
      let color = 'inherit';
      if(ch === '+') color = 'var(--accent)';
      else if(ch === '-') color = 'var(--danger)';
      return `<span style="font-weight:700;color:${color};">${escapeHtml(ch)}</span>`;
    }).join('');
  }

  function formatChange(raw){
    const n = parseNum(raw);
    if(isNaN(n)) return null;
    const cls = n > 0 ? 'positive' : (n < 0 ? 'negative' : 'neutral');
    const sign = n > 0 ? '+' : '';
    const text = sign + (Number.isInteger(n) ? n : n.toFixed(2)) + '%';
    return { text, cls };
  }

  function parseSpreadsheetId(url){
    if(!url) return null;
    const m = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return m ? m[1] : null;
  }

  // Konwertuje odpowiedź Google Visualization API (format "table":
  // {cols:[{label,...}], rows:[{c:[{v},...]}]}) na tablicę rekordów.
  function toRecords(table){
    if(!table || !table.cols || !table.rows) return [];
    const header = table.cols.map(c => normalizeHeader(c.label || c.id));
    const idx = {
      nazwa: header.findIndex(h => h.includes('nazwa') && !h.includes('ticker')),
      ticker: header.findIndex(h => h.includes('ticker')),
      cena: header.findIndex(h => h.includes('cena')),
      trend: header.findIndex(h => h.includes('trend')),
      bos: header.findIndex(h => h.includes('bos')),
      choch: header.findIndex(h => h.includes('choch')),
      entry: header.findIndex(h => h.includes('entry')),
      tp: header.findIndex(h => h.includes('tp')),
      opis: header.findIndex(h => h.includes('opis')),
      link: header.findIndex(h => h.includes('link')),
      interwal: header.findIndex(h => h.includes('interwa')),
      zmiana: header.findIndex(h => h.includes('zmiana')),
      sma50: header.findIndex(h => h.includes('sma50')),
      sma100: header.findIndex(h => h.includes('sma100')),
      sma200: header.findIndex(h => h.includes('sma200')),
    };
    const cell = (row, i) => {
      if(i < 0 || !row.c || !row.c[i] || row.c[i].v === null || row.c[i].v === undefined) return '';
      return String(row.c[i].v).trim();
    };
    const records = [];
    table.rows.forEach(row => {
      const nazwa = cell(row, idx.nazwa);
      const ticker = cell(row, idx.ticker);
      if(!nazwa && !ticker) return; // pomijamy puste wiersze separujące
      const sma50 = cell(row, idx.sma50);
      const sma100 = cell(row, idx.sma100);
      const sma200 = cell(row, idx.sma200);
      records.push({
        nazwa: nazwa || ticker,
        ticker: ticker,
        cena: cell(row, idx.cena),
        trend: cell(row, idx.trend),
        bos: cell(row, idx.bos),
        choch: cell(row, idx.choch),
        entry: cell(row, idx.entry),
        tp: cell(row, idx.tp),
        opis: cell(row, idx.opis),
        link: cell(row, idx.link),
        interwal: cell(row, idx.interwal),
        zmiana: cell(row, idx.zmiana),
        sma50: sma50, sma100: sma100, sma200: sma200,
        // SMA_R to jeden ciąg znaków złożony z wartości kolumn SMA50, SMA100, SMA200 (w tej kolejności)
        smaR: [sma50, sma100, sma200].join(''),
      });
    });
    return records;
  }

  // Reguły alertów (identyczne dla podświetleń na kartach i dla powiadomień):
  //  trend Wzrostowy: cena>=BoS -> "BoS - Potwierdzenie trendu"; cena<=ChoCh -> "ChoCh - Zmiana trendu na Spadkowy"
  //  trend Spadkowy:  cena<=BoS -> "BoS - Potwierdzenie trendu"; cena>=ChoCh -> "ChoCh - Zmiana trendu na Wzrostowy"
  //  cena > TP    -> "TP - Zamknięcie pozycji"
  //  cena < Entry -> "Entry - Otwarcie pozycji"
  function evaluateConditions(item){
    const cena = parseNum(item.cena);
    const bos = parseNum(item.bos);
    const choch = parseNum(item.choch);
    const entry = parseNum(item.entry);
    const tp = parseNum(item.tp);
    const trend = (item.trend || '').trim().toLowerCase();
    const results = [];
    if(isNaN(cena)) return results;

    if(trend === 'wzrostowy'){
      if(!isNaN(bos) && cena >= bos) results.push({ key:'bos', short:'BoS', label:'BoS - Potwierdzenie trendu' });
      if(!isNaN(choch) && cena <= choch) results.push({ key:'choch', short:'ChoCh', label:'ChoCh - Zmiana trendu na Spadkowy' });
    } else if(trend === 'spadkowy'){
      if(!isNaN(bos) && cena <= bos) results.push({ key:'bos', short:'BoS', label:'BoS - Potwierdzenie trendu' });
      if(!isNaN(choch) && cena >= choch) results.push({ key:'choch', short:'ChoCh', label:'ChoCh - Zmiana trendu na Wzrostowy' });
    }
    if(!isNaN(tp) && cena > tp) results.push({ key:'tp', short:'TP', label:'TP - Zamknięcie pozycji' });
    if(!isNaN(entry) && cena < entry) results.push({ key:'entry', short:'Entry', label:'Entry - Otwarcie pozycji' });
    return results;
  }

  function computeHighlights(item){
    const conds = evaluateConditions(item);
    const has = k => conds.some(c => c.key === k);
    return { bos: has('bos'), choch: has('choch'), entry: has('entry'), tp: has('tp') };
  }

/* ============================== POBIERANIE DANYCH (JSONP, bez klucza API) == */
  let jsonpCounter = 0;
  function fetchSheetJSONP(name, { headers = 1 } = {}){
    return new Promise((resolve, reject) => {
      const cbName = '__gvizCb_' + (jsonpCounter++) + '_' + Date.now();
      let settled = false;

      const timeoutId = setTimeout(() => {
        if(settled) return;
        settled = true;
        cleanup();
        reject(new Error('Przekroczono czas oczekiwania na odpowiedź z arkusza „' + name + '”. Sprawdź, czy plik jest udostępniony jako „Każda osoba, która ma link – Odczyt”.'));
      }, 15000);

      function cleanup(){
        clearTimeout(timeoutId);
        delete window[cbName];
        if(script.parentNode) script.parentNode.removeChild(script);
      }

      window[cbName] = function(response){
        if(settled) return;
        settled = true;
        cleanup();
        if(!response || response.status === 'error'){
          const detail = response && response.errors && response.errors[0] &&
            (response.errors[0].detailed_message || response.errors[0].message);
          reject(new Error(detail || ('Arkusz „' + name + '” nie zwrócił danych. Sprawdź nazwę zakładki.')));
          return;
        }
        resolve(response.table);
      };

      const url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID +
        '/gviz/tq?tqx=out:json;reqId:0;responseHandler:' + cbName +
        '&headers=' + headers + '&sheet=' + encodeURIComponent(name);

      const script = document.createElement('script');
      script.src = url;
      script.async = true;
      script.onerror = () => {
        if(settled) return;
        settled = true;
        cleanup();
        reject(new Error('Nie udało się połączyć z arkuszem Google. Sprawdź połączenie internetowe oraz udostępnianie pliku (opcja „Każda osoba, która ma link”).'));
      };
      document.head.appendChild(script);
    });
  }

  async function fetchConfigSheetNames(){
    // Komórka A1 arkusza "config" zawiera JEDEN ciąg znaków z nazwami
    // wszystkich zakładek rozdzielonymi przecinkiem, np. "Spółki,Kryptowaluty,Indeksy".
    // Trzeba go rozbić na tablicę pojedynczych nazw.
    const table = await fetchSheetJSONP(CONFIG_SHEET_NAME, { headers: 0 });
    const rows = (table && table.rows) || [];
    const firstCell = (rows[0] && rows[0].c && rows[0].c[0] && rows[0].c[0].v !== null && rows[0].c[0].v !== undefined)
      ? String(rows[0].c[0].v)
      : '';
    return firstCell
      .split(',')
      .map(s => s.trim())
      .filter(Boolean);
  }

  async function fetchSheet(name){
    const table = await fetchSheetJSONP(name, { headers: 1 });
    return toRecords(table);
  }

  async function loadSheet(name, { force = false } = {}){
    if(cache[name] && !force) return cache[name];
    const records = await fetchSheet(name);
    cache[name] = records;
    return records;
  }

  function clearCache(){
    Object.keys(cache).forEach(k => delete cache[k]);
  }

/* ============================== SKANOWANIE ALERTÓW ========================= */
  function scanRecordsForAlerts(sheetName, records){
    const now = new Date().toISOString();
    records.forEach(item => {
      evaluateConditions(item).forEach(c => {
        const id = sheetName + '::' + (item.ticker || item.nazwa) + '::' + c.key;
        const existingIdx = alerts.findIndex(a => a.id === id);
        const entry = {
          id, sheet: sheetName, nazwa: item.nazwa, ticker: item.ticker,
          key: c.key, short: c.short, label: c.label,
          cena: item.cena,
          detectedAt: existingIdx > -1 ? alerts[existingIdx].detectedAt : now,
          updatedAt: now,
        };
        if(existingIdx > -1) alerts[existingIdx] = entry;
        else alerts.push(entry);
      });
    });
  }

  async function scanAllSheets(force = false){
    for(const name of configSheetNames){
      try{
        const records = await loadSheet(name, { force });
        scanRecordsForAlerts(name, records);
      } catch(e){ /* pojedynczy błąd arkusza nie przerywa skanowania reszty */ }
    }
    persistAlerts();
    renderBellBadge();
    if(bellPopupOpen) renderBellList();
  }

/* ============================== BELL: RENDER =============================== */
  function renderBellBadge(){
    const countEl = document.getElementById('bellCount');
    countEl.textContent = alerts.length;
    countEl.hidden = alerts.length === 0;
  }

  function renderBellList(){
    const list = document.getElementById('bellList');
    const sub = document.getElementById('bellPopupSub');
    sub.textContent = alerts.length ? alerts.length + ' aktywnych' : '';
    if(!alerts.length){
      list.innerHTML = '<div class="bell-empty">Brak aktywnych alertów.</div>';
      return;
    }
    const sorted = alerts.slice().sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    list.innerHTML = sorted.map(a => `
      <div class="bell-item">
        <div class="bell-item-top">
          <span class="bell-item-name">${escapeHtml(a.nazwa)}<span class="bell-item-type">${escapeHtml(a.short)}</span></span>
          <button class="bell-item-del" data-id="${escapeHtml(a.id)}" title="Usuń alert">×</button>
        </div>
        <div class="bell-item-label">${escapeHtml(a.label)}</div>
        <div class="bell-item-meta">
          <span>Cena: ${escapeHtml(formatCena(a.cena))}</span>
          <span>${escapeHtml(a.sheet)} • ${escapeHtml(formatDateTime(a.updatedAt))}</span>
        </div>
      </div>
    `).join('');
    list.querySelectorAll('.bell-item-del').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteAlert(btn.dataset.id);
      });
    });
  }

  function deleteAlert(id){
    alerts = alerts.filter(a => a.id !== id);
    persistAlerts();
    renderBellBadge();
    renderBellList();
  }

  function clearAllAlerts(){
    if(!alerts.length) return;
    if(!confirm('Usunąć wszystkie alerty?')) return;
    alerts = [];
    persistAlerts();
    renderBellBadge();
    renderBellList();
  }

  function buildAlertsEmailBody(){
    if(!alerts.length) return 'Brak aktywnych alertów.';
    const sorted = alerts.slice().sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    return sorted.map(a =>
      `${a.nazwa} | ${a.short} | ${formatCena(a.cena)} | ${formatDateTime(a.updatedAt)}`
    ).join('\n');
  }

  async function sendAlertsMail(){
    if(!settings.email){ alert('Ustaw adres e-mail w zakładce Ustawienia.'); return; }
    try{
      const res = await fetch('https://formsubmit.co/ajax/' + encodeURIComponent(settings.email), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ name: 'Trading Dashboard', message: buildAlertsEmailBody() })
      });
      await res.json();
      alert('Lista alertów została wysłana na adres ' + settings.email + '.');
    } catch(e){
      alert('Nie udało się wysłać maila: ' + e.message);
    }
  }

  async function sendTestMail(){
    if(!settings.email){ alert('Najpierw podaj adres e-mail w Ustawieniach.'); return; }
    try{
      const res = await fetch('https://formsubmit.co/ajax/' + encodeURIComponent(settings.email), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ name: "FormSubmit", message: "I'm from Devro LABS" })
      });
      await res.json();
      alert('Mail testowy został wysłany.');
    } catch(e){
      alert('Błąd wysyłki maila testowego: ' + e.message);
    }
  }

/* ============================== USTAWIENIA: UI ============================= */
  function applySettingsToUI(){
    document.getElementById('sheetUrlInput').value = settings.sheetUrl || '';
    document.getElementById('emailInput').value = settings.email || '';
    document.querySelectorAll('.settings-panel[data-panel="indicators"] input[type=checkbox]').forEach(cb => {
      cb.checked = settings.studies.includes(cb.value);
    });
    updateIndicatorCheckboxAvailability();
  }

  function exportSettings(){
    persistSettings();
    const blob = new Blob([JSON.stringify(settings, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'dashboard-ustawienia.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  function importSettingsFile(file){
    const reader = new FileReader();
    reader.onload = async () => {
      try{
        const parsed = JSON.parse(reader.result);
        settings = Object.assign(settings, parsed);
        persistSettings();
        applySettingsToUI();
        await applySpreadsheetChangeIfNeeded();
        await selectSheet(activeSheet, true);
      } catch(e){
        alert('Nieprawidłowy plik ustawień.');
      }
    };
    reader.readAsText(file);
  }

  async function applySpreadsheetChangeIfNeeded(){
    const newId = parseSpreadsheetId(settings.sheetUrl);
    if(newId && newId !== SPREADSHEET_ID){
      SPREADSHEET_ID = newId;
      settings.spreadsheetId = newId;
      persistSettings();
      refreshSheetFloatSrc();
      clearCache();
      alerts = [];
      persistAlerts();
      await init();
      return true;
    }
    return false;
  }

/* ============================== RENDEROWANIE ================================ */
  function renderTabs(){
    const list = document.getElementById('tabList');
    list.innerHTML = configSheetNames.map(name => `
      <button class="tab-btn ${name === activeSheet ? 'active' : ''}" data-sheet="${escapeHtml(name)}">
        ${escapeHtml(name)}${cache[name] ? `<span class="count">${cache[name].length}</span>` : ''}
      </button>
    `).join('');
    list.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => selectSheet(btn.dataset.sheet));
    });
  }

  function renderLoading(){
    document.getElementById('content').innerHTML = `<div class="state-box">Ładowanie danych z arkusza…</div>`;
  }

  function renderError(message){
    document.getElementById('content').innerHTML = `
      <div class="state-box error">
        ${escapeHtml(message)}<br>
        <button id="retryBtn">Spróbuj ponownie</button>
      </div>`;
    document.getElementById('retryBtn').addEventListener('click', retry);
  }

  function renderEmpty(){
    document.getElementById('content').innerHTML = `<div class="state-box">Brak instrumentów spełniających kryteria w tym arkuszu.</div>`;
  }

  function getSortedRecords(records){
    if(sortMode === 'default') return records;
    const withVal = records.map(r => ({ r, v: parseNum(r.zmiana) }));
    withVal.sort((a, b) => {
      const av = isNaN(a.v) ? -Infinity : a.v;
      const bv = isNaN(b.v) ? -Infinity : b.v;
      return sortMode === 'asc' ? av - bv : bv - av;
    });
    return withVal.map(x => x.r);
  }

  function getVisibleRecords(){
    let records = cache[activeSheet] || [];
    records = getSortedRecords(records);
    if(searchTerm){
      records = records.filter(r => (r.nazwa || '').toLowerCase().includes(searchTerm));
    }
    return records;
  }

  function renderCurrentView(){
    const records = cache[activeSheet];
    if(!records) return;
    const visible = getVisibleRecords();
    if(!visible.length) renderEmpty();
    else renderCards(visible);
  }

  function renderCards(records){
    const content = document.getElementById('content');
    const grid = document.createElement('div');
    grid.className = 'grid' + (gridCols === 3 ? ' cols-3' : gridCols === 2 ? ' cols-2' : '');
    grid.innerHTML = records.map((item, i) => {
      const h = computeHighlights(item);
      const val = (v, key) => `<span class="v${h[key] ? ' badge' : ''}">${escapeHtml(v || '—')}</span>`;
      const chartId = `tv-${activeSheet}-${i}`.replace(/[^a-zA-Z0-9_-]/g, '_');
      const change = formatChange(item.zmiana);
      const nameHtml = escapeHtml(item.nazwa);
      return `
        <article class="card">
          <div class="chart-box" data-symbol="${escapeHtml(item.ticker)}" data-interval="${escapeHtml(item.interwal)}" id="${chartId}">
            <div class="chart-placeholder">${item.ticker ? 'Wczytywanie wykresu…' : 'Brak tickera TradingView'}</div>
          </div>
          <div class="card-header">
            <h3 class="card-name">${nameHtml}</h3>
            ${change ? `<span class="card-change ${change.cls}">${change.text}</span>` : ''}
          </div>
          <div class="stats">
            <div class="stat"><span class="k">Trend:</span> ${val(item.trend)}</div>
            <div class="stat"><span class="k">SMA_R:</span> <span class="v">${renderSmaR(item.smaR)}</span></div>
            <div class="stat"><span class="k">BOS:</span> ${val(item.bos, 'bos')}</div>
            <div class="stat"><span class="k">CHoCH:</span> ${val(item.choch, 'choch')}</div>
            <div class="stat"><span class="k">Entry:</span> ${val(item.entry, 'entry')}</div>
            <div class="stat"><span class="k">TP:</span> ${val(item.tp, 'tp')}</div>
          </div>
          ${item.opis ? `
          <div class="card-desc-wrap">
            <p class="card-desc">${escapeHtml(item.opis)}</p>
            <button class="desc-toggle" hidden>czytaj więcej ▾</button>
          </div>` : ''}
        </article>`;
    }).join('');
    content.innerHTML = '';
    content.appendChild(grid);

    grid.querySelectorAll('.chart-box').forEach(box => {
      if(box.dataset.symbol) chartObserver.observe(box);
    });

    setupDescToggles(grid);
  }

  function setupDescToggles(scope){
    scope.querySelectorAll('.card-desc-wrap').forEach(wrap => {
      const p = wrap.querySelector('.card-desc');
      const btn = wrap.querySelector('.desc-toggle');
      // porównanie wysokości aby wykryć, czy tekst jest obcięty przez line-clamp
      if(p.scrollHeight > p.clientHeight + 1){
        btn.hidden = false;
        btn.addEventListener('click', () => {
          const expanded = p.classList.toggle('expanded');
          btn.textContent = expanded ? 'zwiń ▴' : 'czytaj więcej ▾';
        });
      }
    });
  }

  function onChartVisible(entries, observer){
    entries.forEach(entry => {
      if(!entry.isIntersecting) return;
      observer.unobserve(entry.target);
      embedTradingViewWidget(entry.target, entry.target.dataset.symbol, entry.target.dataset.interval);
    });
  }

  function embedTradingViewWidget(container, symbol, interval){
    container.innerHTML = `<div class="tradingview-widget-container" style="width:100%;height:100%;">
        <div class="tradingview-widget-container__widget"></div>
      </div>`;
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.async = true;
    script.text = JSON.stringify(tvWidgetConfig(symbol, interval));
    container.querySelector('.tradingview-widget-container').appendChild(script);
  }

/* ============================== NAWIGACJA I START =========================== */
  async function selectSheet(name, force = false){
    activeSheet = name;
    renderTabs();
    renderLoading();
    try{
      await loadSheet(name, { force });
      renderTabs();
      renderCurrentView();
      updateTimestamp();
    } catch(err){
      renderError(err.message || 'Nie udało się pobrać danych.');
    }
  }

  function updateTimestamp(){
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Zaktualizowano: ' + now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
  }

  function retry(){
    if(activeSheet) selectSheet(activeSheet, true);
    else init();
  }

  async function init(){
    renderLoading();
    try{
      configSheetNames = await fetchConfigSheetNames();
      if(!configSheetNames.length){
        throw new Error('Zakładka „config” jest pusta lub nie zawiera nazw arkuszy w kolumnie A.');
      }
      if(!activeSheet || !configSheetNames.includes(activeSheet)){
        activeSheet = configSheetNames[0];
      }
      renderTabs();
      await selectSheet(activeSheet);
      scanAllSheets(); // skanowanie w tle pod kątem alertów ze wszystkich arkuszy
    } catch(err){
      renderError(err.message || 'Nie udało się pobrać zakładki „config”.');
    }
  }

/* ---------- Pasek zakładek: strzałki ---------- */
  document.getElementById('tabPrev').addEventListener('click', () => {
    document.getElementById('tabList').scrollBy({ left: -220, behavior: 'smooth' });
  });
  document.getElementById('tabNext').addEventListener('click', () => {
    document.getElementById('tabList').scrollBy({ left: 220, behavior: 'smooth' });
  });

/* ---------- Odświeżanie ---------- */
  document.getElementById('refreshBtn').addEventListener('click', async (e) => {
    e.currentTarget.classList.add('spinning');
    try{
      await selectSheet(activeSheet, true);
      await scanAllSheets(true);
    } finally {
      e.currentTarget.classList.remove('spinning');
    }
  });

/* ---------- Sortowanie ---------- */
  const SORT_STATES = ['default', 'asc', 'desc'];
  document.getElementById('sortBtn').addEventListener('click', () => {
    const idx = (SORT_STATES.indexOf(sortMode) + 1) % SORT_STATES.length;
    sortMode = SORT_STATES[idx];
    const btn = document.getElementById('sortBtn');
    const badge = document.getElementById('sortBadge');
    if(sortMode === 'default'){
      badge.hidden = true;
      btn.classList.remove('active');
      btn.title = 'Sortowanie: domyślne (kliknij, aby zmienić)';
    } else if(sortMode === 'asc'){
      badge.hidden = false; badge.textContent = '↑'; badge.className = 'icon-badge count-accent';
      btn.classList.add('active');
      btn.title = 'Sortowanie: zmiana rosnąco (kliknij, aby zmienić)';
    } else {
      badge.hidden = false; badge.textContent = '↓'; badge.className = 'icon-badge count-accent';
      btn.classList.add('active');
      btn.title = 'Sortowanie: zmiana malejąco (kliknij, aby zmienić)';
    }
    renderCurrentView();
  });

/* ---------- Wyszukiwanie ---------- */
  const searchBtn = document.getElementById('searchBtn');
  const searchInput = document.getElementById('searchInput');
  searchBtn.addEventListener('click', () => {
    const isOpen = searchInput.classList.toggle('open');
    searchBtn.classList.toggle('active', isOpen);
    if(isOpen) searchInput.focus();
    else { searchInput.value = ''; searchTerm = ''; renderCurrentView(); }
  });
  searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value.trim().toLowerCase();
    renderCurrentView();
  });
  // Pole znika, gdy traci focus na rzecz innego elementu (filtr, jeśli aktywny, zostaje zastosowany)
  searchInput.addEventListener('blur', () => {
    searchInput.classList.remove('open');
    searchBtn.classList.toggle('active', searchTerm !== '');
  });

/* ---------- Widok siatki (liczba kolumn) ---------- */
  const GRID_STATES = [4, 3, 2];
  document.getElementById('gridViewBtn').addEventListener('click', () => {
    const idx = (GRID_STATES.indexOf(gridCols) + 1) % GRID_STATES.length;
    gridCols = GRID_STATES[idx];
    document.getElementById('gridBadge').textContent = gridCols;
    document.getElementById('gridViewBtn').title = 'Liczba kolumn: ' + gridCols + ' (kliknij, aby zmienić)';
    renderCurrentView();
  });

/* ---------- Dzwonek: popup ---------- */
  function setOverlay(active){
    document.getElementById('popupOverlay').classList.toggle('active', active);
  }
  function closeAllPopups(){
    document.getElementById('bellPopup').classList.remove('open');
    document.getElementById('settingsPopup').classList.remove('open');
    bellPopupOpen = false;
    settingsPopupOpen = false;
    setOverlay(false);
  }
  document.getElementById('bellBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    const popup = document.getElementById('bellPopup');
    const willOpen = !popup.classList.contains('open');
    closeAllPopups();
    if(willOpen){
      popup.classList.add('open');
      bellPopupOpen = true;
      renderBellList();
      setOverlay(true);
    }
  });
  document.getElementById('bellClearBtn').addEventListener('click', clearAllAlerts);
  document.getElementById('bellMailBtn').addEventListener('click', sendAlertsMail);

/* ---------- Ustawienia: popup i zakładki ---------- */
  document.getElementById('settingsBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    const popup = document.getElementById('settingsPopup');
    const willOpen = !popup.classList.contains('open');
    closeAllPopups();
    if(willOpen){
      popup.classList.add('open');
      settingsPopupOpen = true;
      setOverlay(true);
    }
  });
  document.querySelectorAll('.settings-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.querySelectorAll('.settings-panel').forEach(p => { p.hidden = p.dataset.panel !== target; });
    });
  });
  const MAX_INDICATORS = 5;
  const indicatorCheckboxes = document.querySelectorAll('.settings-panel[data-panel="indicators"] input[type=checkbox]');
  function updateIndicatorCheckboxAvailability(){
    const checkedCount = Array.from(indicatorCheckboxes).filter(cb => cb.checked).length;
    const limitReached = checkedCount >= MAX_INDICATORS;
    indicatorCheckboxes.forEach(cb => {
      cb.disabled = !cb.checked && limitReached;
      cb.closest('.settings-check').classList.toggle('disabled', cb.disabled);
    });
  }
  indicatorCheckboxes.forEach(cb => {
    cb.addEventListener('change', () => {
      if(cb.checked){
        if(!settings.studies.includes(cb.value)) settings.studies.push(cb.value);
      } else {
        settings.studies = settings.studies.filter(s => s !== cb.value);
      }
      persistSettings();
      updateIndicatorCheckboxAvailability();
    });
  });
  document.getElementById('saveIndicatorsBtn').addEventListener('click', async () => {
    persistSettings();
    closeAllPopups();
    renderCurrentView();
  });

  let saveDebounceTimer = null;
  function debouncedPersist(){
    clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(() => persistSettings(), 600);
  }
  document.getElementById('emailInput').addEventListener('input', (e) => {
    settings.email = e.target.value.trim();
    debouncedPersist();
  });
  document.getElementById('sheetUrlInput').addEventListener('input', (e) => {
    settings.sheetUrl = e.target.value.trim();
    debouncedPersist();
  });

  document.getElementById('testMailBtn').addEventListener('click', sendTestMail);
  document.getElementById('exportSettingsBtn').addEventListener('click', exportSettings);
  document.getElementById('importSettingsBtn').addEventListener('click', () => {
    document.getElementById('importFileInput').click();
  });
  document.getElementById('importFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(file) importSettingsFile(file);
    e.target.value = '';
  });
  document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
    persistSettings();
    const changed = await applySpreadsheetChangeIfNeeded();
    if(!changed) await selectSheet(activeSheet, true);
    closeAllPopups();
  });

/* ---------- Zamykanie popupów po kliknięciu poza / Escape ---------- */
  document.addEventListener('click', (e) => {
    if(!e.target.closest('.bell-wrap')) { document.getElementById('bellPopup').classList.remove('open'); bellPopupOpen = false; }
    if(!e.target.closest('.settings-wrap')) { document.getElementById('settingsPopup').classList.remove('open'); settingsPopupOpen = false; }
    if(!bellPopupOpen && !settingsPopupOpen) setOverlay(false);
  });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeAllPopups(); });

/* ---------- Pływające okienko z arkuszem ---------- */
  let sheetFloatState = 'expanded'; // expanded | maximized | minimized | closed
  let sheetAutoMinimizeTimer = null;

  function sheetEditUrl(){
    return 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/edit';
  }
  function refreshSheetFloatSrc(){
    document.getElementById('sheetIframe').src =
      sheetEditUrl() + '?usp=sharing&rm=minimal&widget=true&headers=false';
  }
  function updateSheetFloatUI(){
    const panel = document.getElementById('sheetFloat');
    const icon = document.getElementById('sheetIcon');
    panel.classList.remove('state-expanded', 'state-maximized', 'state-minimized', 'state-closed');
    panel.classList.add('state-' + sheetFloatState);
    icon.hidden = sheetFloatState !== 'minimized';
  }
  function setSheetFloatState(state){
    sheetFloatState = state;
    clearTimeout(sheetAutoMinimizeTimer);
    updateSheetFloatUI();
  }
  document.getElementById('sheetMaxBtn').addEventListener('click', () => {
    setSheetFloatState(sheetFloatState === 'maximized' ? 'expanded' : 'maximized');
  });
  document.getElementById('sheetMinBtn').addEventListener('click', () => setSheetFloatState('minimized'));
  document.getElementById('sheetCloseBtn').addEventListener('click', () => setSheetFloatState('closed'));
  document.getElementById('sheetIcon').addEventListener('click', (e) => {
    if(e.ctrlKey || e.metaKey){
      setSheetFloatState('expanded');
    } else {
      window.open(sheetEditUrl(), '_blank', 'noopener');
    }
  });

/* ---------- Zapis ustawień/alertów przed zamknięciem karty ---------- */
  window.addEventListener('beforeunload', () => {
    persistSettings();
    persistAlerts();
  });

/* ============================== START ======================================= */
  loadSettingsFromCookie();
  loadAlertsFromCookie();
  applySettingsToUI();
  if(settings.spreadsheetId) SPREADSHEET_ID = settings.spreadsheetId;
  refreshSheetFloatSrc();
  renderBellBadge();

  init();

  // Automatyczne, ciche odświeżanie danych (wraz z ponownym skanem alertów) co 7,5 minuty
  setInterval(async () => {
    try{
      configSheetNames = await fetchConfigSheetNames();
      if(!configSheetNames.includes(activeSheet)) activeSheet = configSheetNames[0];
      renderTabs();
      await selectSheet(activeSheet, true);
      await scanAllSheets(true);
    } catch(e){ /* cichy błąd w tle */ }
  }, AUTO_REFRESH_MS);

  // Po 3 sekundach okienko z arkuszem automatycznie się minimalizuje
  sheetAutoMinimizeTimer = setTimeout(() => {
    if(sheetFloatState === 'expanded') setSheetFloatState('minimized');
  }, 3000);
</script>
